<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="Register.css">
</head>
<body>

    <form id="registerForm">
        <h1>Create Account</h1>
        <div class="input">
            <input type="text" id="firstname" name="firstname" placeholder="First Name" required>
            <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
            <input type="text" id="middlename" name="middlename" placeholder="Middle Name" required>
            <input type="text" id="gender" name="gender" placeholder="Gender" required>
            <input type="text" id="province" name="province" placeholder="Province" required>
            <input type="text" id="municipality" name="municipality" placeholder="Municipality" required>
            <input type="text" id="barangay" name="barangay" placeholder="Barangay" required>
            <input type="number" id="zipcode" name="zipcode" placeholder="Zip Code" required>
            <input type="text" id="religion" name="religion" placeholder="Religion" required>
            <input type="text" id="citizenship" name="citizenship" placeholder="Citizenship" required>
            <input type="number" id="contact" name="contact" placeholder="Contact" required>
            <input type="text" id="hobby" name="hobby" placeholder="Hobby" required>
            <input type="text" id="favoratefood" name="favoratefood" placeholder="Favorite Food" required>
            <input type="text" id="fathername" name="fathername" placeholder="Father's Name" required>
            <input type="text" id="mothername" name="mothername" placeholder="Mother's Name" required>
            <input type="text" id="sistername" name="sistername" placeholder="Sister's Name" required>
            <input type="text" id="brothername" name="brothername" placeholder="Brother's Name" required>
            <input type="text" id="neighbourname" name="neighbourname" placeholder="Neighbour Name" required>
            <input type="text" id="username" name="username" placeholder="Username" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <input type="password" id="retypepassword" name="retypepassword" placeholder="Retype Password" required>
            <button type="button" id="doneBtn">Done</button>
        </div>
        <p>Already have an Account? <a href="Login.html">Login Account</a></p>
    </form>
    
    <script src="Register.js"></script>
</body>
</html>
